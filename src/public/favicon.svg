<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#g1)"/>
  <!-- Three stacked container layers -->
  <!-- Bottom layer -->
  <rect x="10" y="42" width="44" height="10" rx="3" fill="rgba(255,255,255,0.30)"/>
  <!-- Middle layer -->
  <rect x="10" y="28" width="44" height="10" rx="3" fill="rgba(255,255,255,0.60)"/>
  <!-- Top layer -->
  <rect x="10" y="14" width="44" height="10" rx="3" fill="rgba(255,255,255,0.95)"/>
  <!-- Dot indicators on each layer (right side) -->
  <circle cx="46" cy="19" r="2.5" fill="rgba(99,102,241,0.7)"/>
  <circle cx="46" cy="33" r="2.5" fill="rgba(99,102,241,0.5)"/>
  <circle cx="46" cy="47" r="2.5" fill="rgba(99,102,241,0.3)"/>
</svg>
