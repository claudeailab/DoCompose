<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DoCompose</title>

  <!-- xterm.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/css/app.css?v=0.5.25" />
</head>
<body>
  <!-- Top bar -->
  <header class="topbar">
    <button class="hamburger" id="hamburgerBtn" aria-label="Toggle sidebar">
      <span></span><span></span><span></span>
    </button>
    <div class="topbar-brand">
      <svg class="brand-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient>
          <linearGradient id="lg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient>
          <linearGradient id="lg3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#6366f1"/></linearGradient>
        </defs>
        <!-- Top layer -->
        <rect x="4"  y="4"  width="28" height="8" rx="3" fill="url(#lg1)"/>
        <!-- Middle layer -->
        <rect x="4"  y="14" width="28" height="8" rx="3" fill="url(#lg2)"/>
        <!-- Bottom layer -->
        <rect x="4"  y="24" width="28" height="8" rx="3" fill="url(#lg3)"/>
        <!-- Dots -->
        <circle cx="10" cy="8"  r="2" fill="white" opacity="0.7"/>
        <circle cx="16" cy="8"  r="2" fill="white" opacity="0.7"/>
        <circle cx="10" cy="18" r="2" fill="white" opacity="0.7"/>
        <circle cx="16" cy="18" r="2" fill="white" opacity="0.7"/>
        <circle cx="10" cy="28" r="2" fill="white" opacity="0.7"/>
        <circle cx="16" cy="28" r="2" fill="white" opacity="0.7"/>
      </svg>
      <span class="brand-name">Do<span class="brand-name-accent">Compose</span></span>
      <span class="brand-version" id="versionBadge">v0.5.25</span>
    </div>

    <!-- project select kept hidden for multi-project API logic -->
    <select id="projectSelect" style="display:none"></select>

    <div class="topbar-stats" id="topbarStats">
      <span class="topbar-stat" title="Total CPU usage across all containers">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2"/></svg>
        <span id="tsCpu">—</span>
      </span>
      <span class="topbar-stat" title="Total memory used by containers">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><circle cx="8" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="16" cy="12" r="1"/></svg>
        <span id="tsMem">—</span>
      </span>
      <span class="topbar-stat" title="Total network I/O across all containers">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12H3M3 12l4-4M3 12l4 4M21 12l-4-4M21 12l-4 4"/></svg>
        <span id="tsNet">—</span>
      </span>
    </div>

    <div class="topbar-search">
      <input type="text" id="searchInput" placeholder="Search services, ports, volumes…" autocomplete="off" />
      <div class="search-results" id="searchResults" hidden></div>
    </div>
  </header>

  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
          Dashboard
        </button>
      </nav>

      <div class="sidebar-services" id="sidebarServices">
        <div class="services-header">Services</div>
        <div id="serviceList" class="service-list"></div>
      </div>
    </aside>

    <!-- Sidebar overlay for mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main content -->
    <main class="main-content">
      <div id="view-dashboard" class="view active"></div>
      <div id="view-env" class="view"></div>
      <div id="view-service" class="view"></div>
    </main>
  </div>

  <!-- Toast notifications -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/app.js?v=0.5.25"></script>
  <script src="/js/dashboard.js?v=0.5.25"></script>
  <script src="/js/service.js?v=0.5.25"></script>
</body>
</html>
