<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DoCompose</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- xterm.js (service terminal) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="/css/app.css?v=0.7.1" />
</head>
<body>
  <!-- Top bar -->
  <header class="topbar">
    <button class="hamburger" id="hamburgerBtn" aria-label="Toggle sidebar">
      <span></span><span></span><span></span>
    </button>
    <a class="topbar-brand" href="#" onclick="showView('dashboard');return false">
      <svg class="brand-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient>
          <linearGradient id="lg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#22d3ee"/></linearGradient>
          <linearGradient id="lg3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#6366f1"/></linearGradient>
        </defs>
        <rect x="4"  y="4"  width="28" height="8" rx="3" fill="url(#lg1)"/>
        <rect x="4"  y="14" width="28" height="8" rx="3" fill="url(#lg2)"/>
        <rect x="4"  y="24" width="28" height="8" rx="3" fill="url(#lg3)"/>
        <circle cx="10" cy="8"  r="2" fill="white" opacity="0.75"/>
        <circle cx="16" cy="8"  r="2" fill="white" opacity="0.75"/>
        <circle cx="10" cy="18" r="2" fill="white" opacity="0.75"/>
        <circle cx="16" cy="18" r="2" fill="white" opacity="0.75"/>
        <circle cx="10" cy="28" r="2" fill="white" opacity="0.75"/>
        <circle cx="16" cy="28" r="2" fill="white" opacity="0.75"/>
      </svg>
      <span class="brand-name">Do<span class="brand-name-accent">Compose</span></span>
      <span class="brand-version" id="versionBadge">v0.6.0</span>
    </a>

    <!-- project select kept hidden for multi-project API logic -->
    <select id="projectSelect" style="display:none"></select>

    <div class="topbar-stats" id="topbarStats">
      <!-- Network / disk I/O widget -->
      <div class="ts-widget ts-widget-net" title="Container network &amp; disk I/O">
        <div class="ts-net-rows">
          <div class="ts-net-row">
            <svg class="ts-net-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/><circle cx="2" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="2" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="2" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
            <span class="ts-net-label ts-up">↑</span><span id="tsNetOut" class="ts-net-val">—</span>
            <span class="ts-net-label ts-down">↓</span><span id="tsNetIn" class="ts-net-val">—</span>
          </div>
          <div class="ts-net-row">
            <svg class="ts-net-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
            <span class="ts-net-label ts-up">↑</span><span id="tsDiskOut" class="ts-net-val">—</span>
            <span class="ts-net-label ts-down">↓</span><span id="tsDiskIn" class="ts-net-val">—</span>
          </div>
        </div>
      </div>
      <!-- CPU widget -->
      <div class="ts-widget ts-widget-cpu" title="Total CPU usage across all containers">
        <div class="ts-widget-label"><span id="tsCpu">—</span></div>
        <svg class="ts-sparkline" id="tsCpuSparkline" viewBox="0 0 120 20" preserveAspectRatio="none">
          <polyline id="tsCpuLine" points="" fill="none" stroke-width="1.5"/>
        </svg>
      </div>
      <!-- Memory widget -->
      <div class="ts-widget ts-widget-mem" title="Total memory used by containers">
        <div class="ts-widget-label"><span id="tsMem">—</span></div>
        <div class="ts-membars" id="tsMemBars"></div>
      </div>
      <!-- Date/time -->
      <div class="ts-widget ts-widget-datetime" id="topbarDatetime" title="Current date &amp; time">
        <span id="tsDate"></span>
        <span id="tsTime"></span>
      </div>
    </div>

    <div class="topbar-search">
      <input type="text" id="searchInput" placeholder="Search services…" autocomplete="off" />
      <div class="search-results" id="searchResults" hidden></div>
    </div>
  </header>

  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
            <rect x="14" y="14" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/>
          </svg>
          Dashboard
        </button>
        <button class="nav-item" data-view="images">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="5" width="20" height="14" rx="2"/>
            <path d="M8 5V3M16 5V3"/>
            <circle cx="8.5" cy="12.5" r="2.5"/>
            <path d="M14 10.5h4M14 14.5h4"/>
          </svg>
          Images
        </button>
        <button class="nav-item" data-view="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Settings
        </button>
      </nav>

      <div class="sidebar-services" id="sidebarServices">
        <div class="services-header"><span>Services</span></div>
        <div id="serviceList" class="service-list"></div>
      </div>
    </aside>

    <!-- Sidebar overlay for mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main content -->
    <main class="main-content">
      <div id="view-dashboard" class="view active"></div>
      <div id="view-service" class="view"></div>
      <div id="view-images" class="view"></div>
      <div id="view-settings" class="view"></div>
    </main>
  </div>

  <!-- Toast notifications -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Update progress modal -->
  <div id="updateProgressModal">
    <div class="upm-box">
      <div class="upm-head">
        <div class="upm-spinner" id="upmSpinner"></div>
        <div class="upm-title" id="upmTitle">Updating…</div>
      </div>
      <div class="upm-body" id="upmBody"></div>
      <div class="upm-foot" id="upmFoot">
        <div class="upm-status" id="upmStatus"></div>
        <button class="btn btn-secondary" onclick="closeUpdateProgressModal()">Close</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js?v=0.8.54"></script>
  <script src="/js/dashboard.js?v=0.8.54"></script>
  <script src="/js/service.js?v=0.8.54"></script>
  <script src="/js/images.js?v=0.8.54"></script>
  <script src="/js/settings.js?v=0.8.54"></script>
</body>
</html>
